<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="theme-color" content="#004b88" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Fatwafinder" />
  <meta name="robots" content="index, follow">
  <title>Fatwafinder</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/home/images/maskable-icon-512x512.png">
  <link rel="icon" type="image/png" href="/home/images/favicon.png">
  <link rel="mask-icon" href="/home/images/logo-mask.png">
  <link rel="manifest" href="/home/manifest.json">
  <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:wght@100;300;400&display=swap" rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px 6px 0;
      font-family: 'Roboto Flex', sans-serif;
      background-color: #004b88;
      background-repeat: repeat-x;
      background-size: 100%;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      overscroll-behavior: none;
    }

    #Search {
      display: block;
      margin: 0 auto;
      padding: 130px 0 30px;
      max-width: 250px;
      width: 100%;
    }

    #search-query {
      display: flex;
      align-items: center;
      max-width: 600px;
      width: 90%;
      margin: 0 auto;
      border-radius: 50px;
      background-color: #fff;
      border: 4px solid #fff;
      height: 62.5px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }

    #search-query:hover {
      border-color: #8b8b8b;
    }

    #search-icon,
    #clear-icon {
      padding: 12px;
      height: 40px;
      vertical-align: middle;
      text-align: start;
      background-color: transparent;
      cursor: pointer;
      border-radius: 50px;
      transition: background-color 0.2s ease;
    }

    #search-icon:hover {
      background-color: #d9d9d9;
    }

    #clear-icon {
      visibility: hidden;
    }

    #input-box {
      min-width: 70px;
      width: 74%;
      height: 50px;
      border: none;
      font-size: 31px;
      font-family: Roboto Flex;
      font-stretch: normal;
      font-weight: thin;
      letter-spacing: normal;
      line-height: 27px;
      color: #000000;
      background-color: transparent;
      cursor: text;
      text-align: start;
      vertical-align: middle;
      justify-content: center;
    }

    /* Links hidden by default as per original intent */
    a {
      display: none;
    }

    .container {
      text-align: center;
    }

    /* Install button hidden by default; shown via JS when PWA prompt fires */
    #install-btn {
      display: none;
      font-size: 20px;
      font-family: 'Roboto Flex', sans-serif;
      padding: 10px;
      border-radius: 50px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    #install-btn:hover {
      background-color: #d9d9d9;
    }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/home/sw.js')
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.error('Service Worker registration failed:', err));
    }
  </script>
</head>

<body>

  <img src="/home/images/fatwafinder_inverted.png" alt="Fatwafinder" id="Search">

  <div id="search-query">
    <img id="search-icon" alt="Search" title="Get Search Results" onclick="submitSearch();" src="/home/images/search.svg">
    <input type="text" id="input-box" placeholder="Ask me..." onkeypress="return searchKeyPress(event);" autocomplete="off">
  </div>

  <br><br>

  <div style="text-align: center;">
    <a href="LINK_GOES_HERE" target="_blank">Learn more about Al-Baahith</a>
  </div>

  <div class="container">
    <button id="install-btn">Install Al-Baahith</button>
  </div>

  <script>
    function submitSearch() {
      var query = document.getElementById('input-box').value;
      var url = '/home/search.html?q=' + query;
      var referLink = document.createElement('a');
      referLink.href = url;
      document.body.appendChild(referLink);
      referLink.click();
    }

    function searchKeyPress(e) {
      e = e || window.event;
      if (e.keyCode === 13) {
        document.getElementById('search-icon').click();
        return false;
      }
      return true;
    }

    window.onload = function () {
      document.getElementById('input-box').focus();
    };

    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-block';
    });

    installBtn.addEventListener('click', () => {
      deferredPrompt.prompt();
    });
  </script>

</body>
</html>
